{% extends 'base.html' %}

{% block title %}Register - MediCare Plus{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p style="color: var(--text-muted);">Join us to start booking appointments</p>
        </div>
        
        <div id="registerAlert" class="alert"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 12px; top: 14px; color: #9ca3af;"></i>
                    <input type="text" id="name" class="form-control" style="padding-left: 2.5rem;" required placeholder="John Doe">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; left: 12px; top: 14px; color: #9ca3af;"></i>
                    <input type="email" id="email" class="form-control" style="padding-left: 2.5rem;" required placeholder="john@example.com">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <div style="position: relative;">
                    <i class="fas fa-phone" style="position: absolute; left: 12px; top: 14px; color: #9ca3af;"></i>
                    <input type="tel" id="phone" class="form-control" style="padding-left: 2.5rem;" required placeholder="1234567890">
                </div>
            </div>
            
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label class="form-label" for="password">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 12px; top: 14px; color: #9ca3af;"></i>
                    <input type="password" id="password" class="form-control" style="padding-left: 2.5rem;" required placeholder="Min 6 characters" minlength="6">
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">Register</button>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                Already have an account? <a href="/login">Login here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function handleRegister(e) {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    
    const submitBtn = e.target.querySelector('button');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';

    const result = await apiCall('/register', 'POST', { name, email, phone, password });
    
    if (result.success) {
        showAlert('registerAlert', 'Registration successful! Redirecting to login...', 'success');
        setTimeout(() => {
            window.location.href = '/login';
        }, 1500);
    } else {
        showAlert('registerAlert', result.error, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Register';
    }
}
</script>
{% endblock %}
